let currentFilter = 'all';
let expandedRow = null;

function getSectorTags(sectors) {
  const tagMap = {
    health: ['Health', 'tag-health'],
    skincare: ['Skincare', 'tag-skincare'],
    longevity: ['Longevity', 'tag-longevity'],
    lifestyle: ['Lifestyle', 'tag-lifestyle'],
    d2c: ['D2C', 'tag-d2c'],
    consumer: ['Consumer', 'tag-consumer'],
    biotech: ['Biotech', 'tag-biotech'],
    femtech: ['FemTech', 'tag-femtech'],
    wellness: ['Wellness', 'tag-wellness']
  };
  return sectors.map(s => {
    const [label, cls] = tagMap[s] || [s, 'tag-health'];
    return `<span class="sector-tag ${cls}">${label}</span>`;
  }).join('');
}

function getFitBadge(fit) {
  const cls = fit === 3 ? 'fit-high' : fit === 2 ? 'fit-medium' : 'fit-low';
  const label = fit === 3 ? '★' : fit === 2 ? '●' : '○';
  return `<span class="fit-score ${cls}" title="${fit===3?'High':fit===2?'Medium':'Low'} Fit">${label}</span>`;
}

function getStatusBadge(status) {
  const map = {
    'new': ['Neu', 'status-new'],
    'contacted': ['Kontaktiert', 'status-contacted'],
    'interested': ['Interessiert', 'status-interested'],
    'meeting': ['Meeting', 'status-meeting'],
    'passed': ['Passed', 'status-passed'],
    'na': ['N/A', 'status-na']
  };
  const [label, cls] = map[status] || ['—', 'status-na'];
  return `<span class="status-badge ${cls}" onclick="cycleStatus(${this?.id || 0})">${label}</span>`;
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  const search = document.getElementById('searchInput').value.toLowerCase();
  
  let filtered = leads.filter(l => {
    if (currentFilter !== 'all') {
      if (currentFilter.startsWith('status-')) {
        if (l.status !== currentFilter.replace('status-', '')) return false;
      } else {
        if (!l.sectors.includes(currentFilter)) return false;
      }
    }
    if (search) {
      const searchStr = `${l.fund} ${l.hq} ${l.contact} ${l.portfolio} ${l.notes}`.toLowerCase();
      if (!searchStr.includes(search)) return false;
    }
    return true;
  });

  document.getElementById('resultCount').textContent = `${filtered.length} Fonds`;

  let html = '';
  filtered.forEach(l => {
    html += `
      <tr data-id="${l.id}" onclick="toggleDetail(${l.id})">
        <td>${getFitBadge(l.fit)}</td>
        <td class="fund-name"><a href="${l.url}" target="_blank" onclick="event.stopPropagation()">${l.fund}</a></td>
        <td>${l.hq}</td>
        <td>${l.stage}</td>
        <td style="white-space:nowrap;font-weight:600;">${l.ticket}</td>
        <td>${getSectorTags(l.sectors)}</td>
        <td>
          <div style="font-weight:500;">${l.contact}</div>
          <div style="font-size:11px;color:var(--text-secondary);">${l.role}</div>
          ${l.email ? `<a class="contact-link" href="mailto:${l.email}" onclick="event.stopPropagation()">✉ ${l.email}</a>` : ''}
          ${l.linkedin ? `<br><a class="contact-link" href="${l.linkedin}" target="_blank" onclick="event.stopPropagation()">in LinkedIn</a>` : ''}
        </td>
        <td><span class="status-badge status-${l.status}" onclick="event.stopPropagation(); cycleStatus(${l.id})">${{'new':'Neu','contacted':'Kontaktiert','interested':'Interessiert','meeting':'Meeting','passed':'Passed','na':'N/A'}[l.status]}</span></td>
        <td><textarea class="notes-area" onclick="event.stopPropagation()" rows="2">${l.notes}</textarea></td>
        <td style="cursor:pointer;color:var(--text-secondary);font-size:16px;">▾</td>
      </tr>
      <tr class="detail-row" id="detail-${l.id}" style="display:none;">
        <td colspan="10">
          <div class="detail-content">
            <div class="detail-grid">
              <div class="detail-item"><label>Portfolio</label><span>${l.portfolio || '—'}</span></div>
              <div class="detail-item"><label>Strategischer Fit</label><span>${l.strategic || '—'}</span></div>
              <div class="detail-item"><label>Website</label><span><a href="${l.url}" target="_blank">${l.url}</a></span></div>
            </div>
          </div>
        </td>
      </tr>
    `;
  });
  tbody.innerHTML = html;
  renderStats();
}

function renderStats() {
  const counts = { new: 0, contacted: 0, interested: 0, meeting: 0, passed: 0 };
  leads.forEach(l => { if (counts[l.status] !== undefined) counts[l.status]++; });
  
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="stat-label">Gesamt</div><div class="stat-value">${leads.length}</div></div>
    <div class="stat-card"><div class="stat-label">Neu</div><div class="stat-value" style="color:#1e40af;">${counts.new}</div></div>
    <div class="stat-card"><div class="stat-label">Kontaktiert</div><div class="stat-value" style="color:#92400e;">${counts.contacted}</div></div>
    <div class="stat-card"><div class="stat-label">Interessiert</div><div class="stat-value" style="color:#065f46;">${counts.interested}</div></div>
    <div class="stat-card"><div class="stat-label">Meeting</div><div class="stat-value" style="color:#5b21b6;">${counts.meeting}</div></div>
    <div class="stat-card"><div class="stat-label">Passed</div><div class="stat-value" style="color:#991b1b;">${counts.passed}</div></div>
    <div class="stat-card"><div class="stat-label">High Fit (★)</div><div class="stat-value" style="color:#059669;">${leads.filter(l=>l.fit===3).length}</div></div>
  `;
}

function toggleDetail(id) {
  const row = document.getElementById(`detail-${id}`);
  if (expandedRow && expandedRow !== id) {
    document.getElementById(`detail-${expandedRow}`).style.display = 'none';
  }
  row.style.display = row.style.display === 'none' ? '' : 'none';
  expandedRow = row.style.display === 'none' ? null : id;
}

function cycleStatus(id) {
  const order = ['new', 'contacted', 'interested', 'meeting', 'passed'];
  const lead = leads.find(l => l.id === id);
  const idx = order.indexOf(lead.status);
  lead.status = order[(idx + 1) % order.length];
  renderTable();
}

function setFilter(btn, filter) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = filter;
  renderTable();
}

function filterTable() { renderTable(); }

function sortTable(col) {
  // Simple sort - just re-render for now
  renderTable();
}

function exportCSV() {
  const headers = ['Fit','Fonds','URL','Standort','Stage','Ticket','Sektoren','Kontakt','Rolle','Email','LinkedIn','Status','Portfolio','Strategischer Fit','Notizen'];
  const rows = leads.map(l => [
    l.fit === 3 ? 'High' : l.fit === 2 ? 'Medium' : 'Low',
    l.fund, l.url, l.hq, l.stage, l.ticket,
    l.sectors.join('; '), l.contact, l.role, l.email, l.linkedin,
    l.status, l.portfolio, l.strategic, l.notes
  ].map(v => `"${(v||'').replace(/"/g,'""')}"`).join(','));
  
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'anainonu-investor-leads.csv';
  a.click();
}
